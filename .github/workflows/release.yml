name: Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name_core: hf_core_linux_x86_64
            artifact_name_cli: hf_linux_x86_64
            compile_cmd_core: g++ -std=c++20 -O3 src/codegen.cpp src/codegen_html.cpp src/lexer.cpp src/parser.cpp src/security_analyzer.cpp src/main.cpp -o hf_core_linux_x86_64
            compile_cmd_cli: go build -o hf_linux_x86_64 cli/main.go
          - os: macos-latest
            artifact_name_core: hf_core_darwin_arm64
            artifact_name_cli: hf_darwin_arm64
            compile_cmd_core: clang++ -std=c++20 -O3 src/codegen.cpp src/codegen_html.cpp src/lexer.cpp src/parser.cpp src/security_analyzer.cpp src/main.cpp -o hf_core_darwin_arm64 -target arm64-apple-macos11
            compile_cmd_cli: go build -o hf_darwin_arm64 cli/main.go
          - os: windows-latest
            artifact_name_core: hf_core_windows_x86_64.exe
            artifact_name_cli: hf_windows_x86_64.exe
            compile_cmd_core: g++ -std=c++20 -O3 src/codegen.cpp src/codegen_html.cpp src/lexer.cpp src/parser.cpp src/security_analyzer.cpp src/main.cpp -o hf_core_windows_x86_64.exe
            compile_cmd_cli: go build -o hf_windows_x86_64.exe cli/main.go

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Generate embedded runtime
        run: |
          mkdir -p build
          bash tools/embed_runtime.sh build/embedded_runtime.hpp \
            src/runtime/router.hpp \
            src/runtime/storage.hpp \
            src/runtime/storage_sqlite.hpp \
            src/runtime/storage_postgres.hpp \
            src/runtime/storage_mysql.hpp

      - name: Compile Core
        run: ${{ matrix.compile_cmd_core }}

      - name: Compile CLI
        run: ${{ matrix.compile_cmd_cli }}

      - name: Upload Core Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name_core }}
          path: ${{ matrix.artifact_name_core }}

      - name: Upload CLI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name_cli }}
          path: ${{ matrix.artifact_name_cli }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: ./dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist/hf_linux_x86_64
            ./dist/hf_core_linux_x86_64
            ./dist/hf_darwin_arm64
            ./dist/hf_core_darwin_arm64
            ./dist/hf_windows_x86_64.exe
            ./dist/hf_core_windows_x86_64.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
