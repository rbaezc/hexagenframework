title: "Hexagen Core Raffle"
theme: "glassmorphism"
components:
  - type: "heading"
    text: "🎟️ Hexagen Premium Raffle System"
    subtitle: "Orquestación en Go, Transacciones en C++ y UI Dinámica en JS"
  - type: "input"
    name: "ticket"
    label: "Nombre del Ticket"
    placeholder: "Ej. Boleto Dorado 777"
  - type: "input"
    name: "id"
    label: "ID del Comprador"
    placeholder: "Ej. 42"
  - type: "button"
    text: "Guardar Boleto (C++ Speed)"
    action: "Guardar"
